<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>点阵连线方格对战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;min-height:100vh;
  min-height:100dvh;padding:8px 0;overflow-x:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
h1{font-size:1.15rem;margin-bottom:4px;letter-spacing:2px}
#status-bar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;
  background:#1e293b;border-radius:10px;padding:6px 16px;margin-bottom:6px;
  font-size:.85rem;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.score-a{color:#38bdf8;font-weight:700}
.score-b{color:#fb923c;font-weight:700}
.turn-indicator{padding:2px 10px;border-radius:6px;font-weight:700;font-size:.8rem}
.turn-a{background:rgba(56,189,248,.18);color:#38bdf8}
.turn-b{background:rgba(251,146,60,.18);color:#fb923c}
canvas{cursor:pointer;display:block;border-radius:4px}
.btns{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{background:#334155;color:#e2e8f0;border:none;padding:6px 14px;
  border-radius:6px;cursor:pointer;font-size:.8rem;transition:background .2s}
button:hover{background:#475569}
button:active{background:#64748b}
select{background:#334155;color:#e2e8f0;border:1px solid #475569;padding:4px 8px;
  border-radius:6px;font-size:.8rem;cursor:pointer;outline:none}
select:hover{border-color:#6366f1}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:8px 22px;border-radius:8px;
  font-size:.85rem;opacity:0;pointer-events:none;
  transition:opacity .25s;z-index:10;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);border:1px solid #334155}
#toast.show{opacity:1}
#game-over-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:20;
  justify-content:center;align-items:center}
#game-over-overlay.show{display:flex}
#game-over-box{background:#1e293b;padding:28px 36px;border-radius:14px;
  text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid #334155}
#game-over-box h2{font-size:1.3rem;margin-bottom:10px}
#game-over-box p{font-size:1rem;margin-bottom:14px;color:#94a3b8}
#game-over-box button{font-size:.95rem;padding:8px 28px}
.legend{display:flex;gap:14px;font-size:.72rem;color:#64748b;margin-top:3px}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px}
.mode-bar{display:flex;gap:10px;margin-bottom:4px;align-items:center;flex-wrap:wrap;justify-content:center}
.mode-bar label{font-size:.78rem;color:#94a3b8;display:flex;align-items:center;gap:4px;cursor:pointer}
.mode-bar input[type=radio]{accent-color:#6366f1}
.mode-bar .sep{width:1px;height:16px;background:#334155}
#celebrate-canvas{position:fixed;inset:0;pointer-events:none;z-index:30}
.size-label{font-size:.78rem;color:#94a3b8}
</style>
</head>
<body>
<h1>🔵 点阵连线方格对战 🟠</h1>
<div class="mode-bar">
  <label><input type="radio" name="mode" value="pvp" checked> 双人对战</label>
  <label><input type="radio" name="mode" value="ai"> 人机对战</label>
  <label><input type="radio" name="mode" value="ttt"> 井字棋对战</label>
  <div class="sep"></div>
  <span id="size-label" class="size-label">棋盘：</span>
  <select id="size-select">
    
    <option value="3">3×3（4格）</option>
    <option value="4">4×4（9格）</option>
    <option value="5">5×5（16格）</option>
    <option value="6">6×6（25格）</option>
    <option value="7">7×7（36格）</option>
    <option value="8">8×8（49格）</option>
    <option value="9">9×9（64格）</option>
    <option value="10" selected>10×10（81格）</option>
  </select>
</div>
<div id="status-bar">
  <span class="turn-indicator turn-a" id="turn-label">A 方回合</span>
  <span id="label-a">A：</span><span><span class="score-a" id="score-a">0</span></span>
  <span id="label-b">B：</span><span><span class="score-b" id="score-b">0</span></span>
  <span id="timer-wrap" style="display:none">⏱<span id="timer">30</span>s</span>
</div>
<canvas id="c"></canvas>
<div class="legend">
  <span><i style="background:rgba(56,189,248,.45)"></i>A（蓝）</span>
  <span><i style="background:rgba(251,146,60,.45)"></i>B（橙）</span>
  <span><i style="background:rgba(255,255,255,.25)"></i>上一手</span>
</div>
<div class="btns">
  <button onclick="undoMove()">↩ 悔棋</button>
  <button onclick="resetGame()">🔄 重置</button>
  <button onclick="toggleTimer()">⏱ 计时</button>
  <button onclick="toggleSound()">🔊 音效</button>
</div>
<div id="toast"></div>
<div id="game-over-overlay"><div id="game-over-box">
  <h2 id="go-title">对局结束</h2>
  <p id="go-detail"></p>
  <button onclick="resetGame();document.getElementById('game-over-overlay').classList.remove('show')">再来一局</button>
</div></div>
<canvas id="celebrate-canvas"></canvas>

<script>
/* ======== CONFIG ======== */
let ROWS=10,COLS=10,BOX_ROWS,BOX_COLS;
const DOT_R_BASE=5,EDGE_W=3,HOVER_W=14;
const COLOR_DOT='#94a3b8';
const COLOR_A_FILL='rgba(56,189,248,0.42)',COLOR_B_FILL='rgba(251,146,60,0.42)';
const COLOR_A_LINE='#38bdf8',COLOR_B_LINE='#fb923c';
const COLOR_HOVER_A='rgba(56,189,248,0.4)',COLOR_HOVER_B='rgba(251,146,60,0.4)';
const COLOR_LAST='rgba(255,255,255,0.5)';

function updateDims(){
  BOX_ROWS=ROWS-1;BOX_COLS=COLS-1;
}
updateDims();

/* ======== STATE ======== */
let hEdges,vEdges,boxes,current,scoreA,scoreB,gameOver;
let mode='dots';
let tttBoard=[],tttCurrent='X',tttWinner=null,tttMoves={'X':[],'O':[]};
let timerEnabled=false,timerVal=30,timerInterval=null;
let hoverEdge=null,lastEdge=null;
let historyStack=[];
let aiMode=false,soundOn=true;
let animatingEdges=[],animatingBoxes=[];
let CELL,PAD,DOT_R;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

/* ======== SOUND (Web Audio API) ======== */
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,vol=0.15){
  if(!soundOn)return;ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}
function sndDraw(){playTone(600,0.08)}
function sndBox(){playTone(880,0.12,0.2);setTimeout(()=>playTone(1100,0.1,0.15),80)}
function sndGameOver(){playTone(523,0.15);setTimeout(()=>playTone(659,0.15),120);setTimeout(()=>playTone(784,0.2),240)}
function sndUndo(){playTone(350,0.1,0.1)}

/* ======== RESPONSIVE SIZING ======== */
function calcSize(){
  const maxW=Math.min(window.innerWidth-16,560);
  const maxH=window.innerHeight-200;
  if(mode==='ttt'){
    ROWS=5;COLS=5;updateDims();
  }
  CELL=Math.floor(Math.min(maxW/(COLS-1),maxH/(ROWS-1)));
  CELL=Math.max(CELL,mode==='ttt'?48:Math.min(40,Math.floor(560/(COLS-1))));
  PAD=Math.max(CELL*0.6,16);
  DOT_R=Math.max(CELL*0.09,DOT_R_BASE*(CELL/52));
  canvas.width=PAD*2+(COLS-1)*CELL;
  canvas.height=PAD*2+(ROWS-1)*CELL;
}

/* ======== INIT ======== */
function init(){
  if(mode==='ttt'){
    ROWS=5;COLS=5;updateDims();
    tttBoard=Array.from({length:ROWS},()=>Array(COLS).fill(null));
    tttCurrent='X';tttWinner=null;tttMoves={'X':[],'O':[]};
    scoreA=0;scoreB=0;gameOver=false;
    hoverEdge=null;lastEdge=null;historyStack=[];
    calcSize();updateUI();draw();
  }else{
    hEdges=Array.from({length:ROWS},()=>Array(COLS-1).fill(0));
    vEdges=Array.from({length:ROWS-1},()=>Array(COLS).fill(0));
    boxes=Array.from({length:BOX_ROWS},()=>Array(BOX_COLS).fill(null));
    current='A';scoreA=0;scoreB=0;gameOver=false;
    hoverEdge=null;lastEdge=null;historyStack=[];animatingEdges=[];animatingBoxes=[];
    calcSize();updateUI();draw();
  }
}

/* ======== SAVE / LOAD ======== */
function saveState(){
  try{localStorage.setItem('dab-save',JSON.stringify({
    hEdges,vEdges,boxes,current,scoreA,scoreB,lastEdge,aiMode,ROWS,COLS,mode,
    tttBoard,tttCurrent,tttWinner,tttMoves
  }))}catch(e){}
}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem('dab-save'));
    if(!d||!d.hEdges)return false;
    ROWS=d.ROWS||10;COLS=d.COLS||10;updateDims();
    document.getElementById('size-select').value=ROWS;
    hEdges=d.hEdges;vEdges=d.vEdges;boxes=d.boxes;
    current=d.current;scoreA=d.scoreA;scoreB=d.scoreB;
    lastEdge=d.lastEdge;aiMode=!!d.aiMode;gameOver=false;
    historyStack=[];animatingEdges=[];animatingBoxes=[];
    mode=d.mode||'dots';
    document.querySelector(`input[name=mode][value=${mode==='ttt'?'ttt':aiMode?'ai':'pvp'}]`).checked=true;
    document.getElementById('size-select').style.display=mode==='ttt'?'none':'';
    document.getElementById('size-label').style.display=mode==='ttt'?'none':'';
    if(mode==='ttt'){
      ROWS=5;COLS=5;updateDims();
      tttBoard=d.tttBoard||Array.from({length:ROWS},()=>Array(COLS).fill(null));
      tttCurrent=d.tttCurrent||'X';
      tttWinner=d.tttWinner||null;
      tttMoves=d.tttMoves||{'X':[],'O':[]};
    }
    calcSize();updateUI();draw();return true;
  }catch(e){return false}
}

/* ======== COORDINATE HELPERS ======== */
function dotX(c){return PAD+c*CELL}
function dotY(r){return PAD+r*CELL}
function ticTacToeCx(c){return PAD+c*CELL}
function ticTacToeCy(r){return PAD+r*CELL}
function ticTacToeDrawMark(r,c,mark,alpha=1){
  const cx=ticTacToeCx(c),cy=ticTacToeCy(r),s=CELL*0.32,w=Math.max(3,CELL*0.12);
  ctx.save();ctx.globalAlpha=alpha;ctx.lineCap='round';ctx.lineWidth=w;
  if(mark==='X'){
    ctx.strokeStyle=COLOR_A_LINE;
    ctx.beginPath();ctx.moveTo(cx-s,cy-s);ctx.lineTo(cx+s,cy+s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+s,cy-s);ctx.lineTo(cx-s,cy+s);ctx.stroke();
  }else{
    ctx.strokeStyle=COLOR_B_LINE;
    ctx.beginPath();ctx.arc(cx,cy,s,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}
function ticTacToeCheckWinner(board){
  const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const[a,b,c]of lines){
    const ra=Math.floor(a/3),ca=a%3,rb=Math.floor(b/3),cb=b%3,rc=Math.floor(c/3),cc=c%3;
    const v=board[ra][ca];
    if(v&&v===board[rb][cb]&&v===board[rc][cc])return{winner:v,line:[[ra,ca],[rb,cb],[rc,cc]]};
  }
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){if(!board[r][c])return null}
  return{winner:null,line:[]};
}
function ticTacToeCells(){
  return Array.from({length:9},(_,i)=>[Math.floor(i/3),i%3]);
}
function ticTacToeAvailable(board){
  return ticTacToeCells().filter(([r,c])=>!board[r][c]);
}
function ticTacToeMove(r,c){
  if(gameOver||mode!=='ttt')return;
  if(r<0||r>=3||c<0||c>=3)return;
  if(tttBoard[r][c])return;
  const player=tttCurrent,opponent=player==='X'?'O':'X';
  historyStack.push({tttBoard:tttBoard.map(row=>[...row]),tttCurrent,tttWinner,tttMoves:{'X':[...tttMoves['X']],'O':[...tttMoves['O']]},scoreA,scoreB});
  tttBoard[r][c]=player;
  tttMoves[player].push([r,c]);
  lastEdge={type:'ttt',r,c};
  sndDraw();
  let result=ticTacToeCheckWinner(tttBoard);
  if(!result&&tttMoves[player].length>=3){
    const keep=new Set();
    const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(const[a,b,c]of lines){
      const ra=Math.floor(a/3),ca=a%3,rb=Math.floor(b/3),cb=b%3,rc=Math.floor(c/3),cc=c%3;
      if(tttBoard[ra][ca]===player&&tttBoard[rb][cb]===player&&tttBoard[rc][cc]===player){
        keep.add(`${ra},${ca}`);keep.add(`${rb},${cb}`);keep.add(`${rc},${cc}`);
      }
    }
    const[er,ec]=tttMoves[player][0];
    if(!keep.has(`${er},${ec}`)){
      tttBoard[er][ec]=null;tttMoves[player].shift();
      showToast('🧽 第一手已消失（未成连线）');
    }
    result=ticTacToeCheckWinner(tttBoard);
  }
  if(result){
    tttWinner=result.winner||'draw';
    if(result.winner==='X')scoreA++;else if(result.winner==='O')scoreB++;
    updateUI();endGame();return;
  }
  if(ticTacToeAvailable(tttBoard).length===0&&tttWinner===null){
    tttWinner='draw';
    updateUI();endGame();return;
  }
  tttCurrent=opponent;
  updateUI();saveState();draw();
}
function drawTicTacToe(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(148,163,184,0.18)';ctx.lineWidth=1.2;
  for(let i=0;i<=3;i++){
    ctx.beginPath();ctx.moveTo(ticTacToeCx(i),ticTacToeCy(0));ctx.lineTo(ticTacToeCx(i),ticTacToeCy(3));ctx.stroke();
    ctx.beginPath();ctx.moveTo(ticTacToeCx(0),ticTacToeCy(i));ctx.lineTo(ticTacToeCx(3),ticTacToeCy(i));ctx.stroke();
  }
  if(hoverEdge&&hoverEdge.type==='ttt'&&!gameOver){
    const{r,c}=hoverEdge;
    if(!tttBoard[r][c]){
      ctx.fillStyle=tttCurrent==='X'?'rgba(56,189,248,0.18)':'rgba(251,146,60,0.18)';
      ctx.fillRect(ticTacToeCx(c)+1,ticTacToeCy(r)+1,CELL-2,CELL-2);
    }
  }
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const mark=tttBoard[r][c];
    if(mark)ticTacToeDrawMark(r,c,mark,1);
  }
  if(lastEdge&&lastEdge.type==='ttt'){
    ctx.save();ctx.globalAlpha=0.65;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.strokeRect(ticTacToeCx(lastEdge.c)-2,ticTacToeCy(lastEdge.r)-2,CELL+4,CELL+4);
    ctx.restore();
  }
}
function ticTacToeHitTest(mx,my){
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const cx=ticTacToeCx(c)+CELL/2,cy=ticTacToeCy(r)+CELL/2;
    if(Math.abs(mx-cx)<CELL/2&&Math.abs(my-cy)<CELL/2)return{type:'ttt',r,c};
  }
  return null;
}

/* ======== DRAW ======== */
function draw(){
  if(mode==='ttt'){drawTicTacToe();return}
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // filled boxes
  for(let br=0;br<BOX_ROWS;br++)for(let bc=0;bc<BOX_COLS;bc++){
    if(!boxes[br][bc])continue;
    const anim=animatingBoxes.find(a=>a.br===br&&a.bc===bc);
    const alpha=anim?anim.progress:1;
    const baseColor=boxes[br][bc]==='A'?[56,189,248]:[251,146,60];
    ctx.fillStyle=`rgba(${baseColor[0]},${baseColor[1]},${baseColor[2]},${0.15+0.27*alpha})`;
    ctx.fillRect(dotX(bc)+1,dotY(br)+1,CELL-2,CELL-2);
  }

  // hover
  if(hoverEdge&&!gameOver){
    const{type,r,c}=hoverEdge;
    const drawn=type==='h'?hEdges[r][c]:vEdges[r][c];
    if(!drawn){
      ctx.strokeStyle=current==='A'?COLOR_HOVER_A:COLOR_HOVER_B;
      ctx.lineWidth=EDGE_W+2;ctx.lineCap='round';ctx.beginPath();
      if(type==='h'){ctx.moveTo(dotX(c),dotY(r));ctx.lineTo(dotX(c+1),dotY(r))}
      else{ctx.moveTo(dotX(c),dotY(r));ctx.lineTo(dotX(c),dotY(r+1))}
      ctx.stroke();
    }
  }

  // drawn edges
  ctx.lineWidth=EDGE_W;ctx.lineCap='round';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-1;c++){
    if(!hEdges[r][c])continue;
    const isLast=lastEdge&&lastEdge.type==='h'&&lastEdge.r===r&&lastEdge.c===c;
    ctx.strokeStyle=isLast?COLOR_LAST:(hEdges[r][c]==='A'?COLOR_A_LINE:COLOR_B_LINE);
    ctx.beginPath();ctx.moveTo(dotX(c),dotY(r));ctx.lineTo(dotX(c+1),dotY(r));ctx.stroke();
  }
  for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS;c++){
    if(!vEdges[r][c])continue;
    const isLast=lastEdge&&lastEdge.type==='v'&&lastEdge.r===r&&lastEdge.c===c;
    ctx.strokeStyle=isLast?COLOR_LAST:(vEdges[r][c]==='A'?COLOR_A_LINE:COLOR_B_LINE);
    ctx.beginPath();ctx.moveTo(dotX(c),dotY(r));ctx.lineTo(dotX(c),dotY(r+1));ctx.stroke();
  }

  // last edge glow
  if(lastEdge&&!gameOver){
    ctx.save();ctx.globalAlpha=0.6;
    ctx.strokeStyle='#fff';ctx.lineWidth=1;
    const{type,r,c}=lastEdge;
    if(type==='h'){ctx.strokeRect(dotX(c)-2,dotY(r)-2,CELL+4,4)}
    else{ctx.strokeRect(dotX(c)-2,dotY(r)-2,4,CELL+4)}
    ctx.restore();
  }

  // dots
  ctx.fillStyle=COLOR_DOT;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    ctx.beginPath();ctx.arc(dotX(c),dotY(r),DOT_R,0,Math.PI*2);ctx.fill();
  }
}

/* ======== HIT TEST ======== */
function hitTest(mx,my){
  
  let best=null,bestDist=Infinity;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-1;c++){
    const x1=dotX(c),x2=dotX(c+1),y=dotY(r);
    const d=Math.abs(my-y);
    if(mx>=x1-4&&mx<=x2+4&&d<HOVER_W&&d<bestDist){bestDist=d;best={type:'h',r,c}}
  }
  for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS;c++){
    const x=dotX(c),y1=dotY(r),y2=dotY(r+1);
    const d=Math.abs(mx-x);
    if(my>=y1-4&&my<=y2+4&&d<HOVER_W&&d<bestDist){bestDist=d;best={type:'v',r,c}}
  }
  return best;
}

/* ======== CORE LOGIC ======== */
function deepCopy(){
  return{hEdges:hEdges.map(r=>[...r]),vEdges:vEdges.map(r=>[...r]),
    boxes:boxes.map(r=>[...r]),current,scoreA,scoreB,lastEdge};
}

function placeEdge(type,r,c,fromAI){
  if(gameOver)return false;
  if(type==='ttt'){ticTacToeMove(r,c);return true}
  if(type==='h'&&hEdges[r][c])return false;
  if(type==='v'&&vEdges[r][c])return false;
  if(aiMode&&!fromAI&&current==='B')return false;

  historyStack.push(deepCopy());

  if(type==='h')hEdges[r][c]=current;else vEdges[r][c]=current;
  lastEdge={type,r,c};
  sndDraw();

  animatingEdges.push({type,r,c,progress:0});

  let closed=0;
  const toCheck=[];
  if(type==='h'){if(r>0)toCheck.push([r-1,c]);if(r<BOX_ROWS)toCheck.push([r,c])}
  else{if(c>0)toCheck.push([r,c-1]);if(c<BOX_COLS)toCheck.push([r,c])}
  for(const[br,bc]of toCheck){
    if(br<0||br>=BOX_ROWS||bc<0||bc>=BOX_COLS)continue;
    if(boxes[br][bc])continue;
    if(hEdges[br][bc]&&hEdges[br+1][bc]&&vEdges[br][bc]&&vEdges[br][bc+1]){
      boxes[br][bc]=current;closed++;
      if(current==='A')scoreA++;else scoreB++;
      animatingBoxes.push({br,bc,progress:0});
    }
  }

  if(closed>0){
    sndBox();
    showToast(`${current==='A'?'🔵 A':'🟠 B'} 获得 ${closed} 格！额外再走一步`);
  }else{
    current=current==='A'?'B':'A';
  }

  resetTimer();updateUI();saveState();
  runAnimations(()=>{
    if(scoreA+scoreB===BOX_ROWS*BOX_COLS){endGame();return}
    if(aiMode&&current==='B'&&!gameOver)aiTurn();
  });
  return true;
}

/* ======== ANIMATIONS ======== */
function runAnimations(cb){
  const start=performance.now(),dur=180;
  function step(now){
    const t=Math.min((now-start)/dur,1);
    animatingEdges.forEach(a=>a.progress=t);
    animatingBoxes.forEach(a=>a.progress=t);
    draw();
    if(t<1)requestAnimationFrame(step);
    else{animatingEdges=[];animatingBoxes=[];draw();if(cb)cb()}
  }
  requestAnimationFrame(step);
}

/* ======== AI ======== */
function aiTurn(){
  if(gameOver)return;
  setTimeout(()=>{
    const move=aiPickBest();
    if(move)placeEdge(move.type,move.r,move.c,true);
  },350);
}

function aiPickBest(){
  const edges=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-1;c++)
    if(!hEdges[r][c])edges.push({type:'h',r,c});
  for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS;c++)
    if(!vEdges[r][c])edges.push({type:'v',r,c});
  if(!edges.length)return null;

  let best=null,bestScore=-Infinity;
  for(const e of edges){
    let closes=0,dangerous=0;
    const neighbors=[];
    if(e.type==='h'){if(e.r>0)neighbors.push([e.r-1,e.c]);if(e.r<BOX_ROWS)neighbors.push([e.r,e.c])}
    else{if(e.c>0)neighbors.push([e.r,e.c-1]);if(e.c<BOX_COLS)neighbors.push([e.r,e.c])}
    for(const[br,bc]of neighbors){
      if(br<0||br>=BOX_ROWS||bc<0||bc>=BOX_COLS)continue;
      if(boxes[br][bc])continue;
      const cnt=(hEdges[br][bc]?1:0)+(hEdges[br+1][bc]?1:0)+(vEdges[br][bc]?1:0)+(vEdges[br][bc+1]?1:0);
      if(cnt===3)closes++;
      if(cnt===2)dangerous++;
    }
    let score=closes*100-dangerous*10+Math.random()*2;
    if(score>bestScore){bestScore=score;best=e}
  }
  
  return best;
}

/* ======== UNDO ======== */
function undoMove(){
  if(!historyStack.length||gameOver)return;
  sndUndo();
  if(mode==='ttt'){
    const s=historyStack.pop();
    if(!s){init();return}
    tttBoard=s.tttBoard;tttCurrent=s.tttCurrent;tttWinner=s.tttWinner;tttMoves=s.tttMoves;
    scoreA=s.scoreA;scoreB=s.scoreB;lastEdge=null;
    updateUI();draw();return;
  }
  if(aiMode&&historyStack.length>=2){
    historyStack.pop();historyStack.pop();
  }else{
    historyStack.pop();
  }
  const s=historyStack.length?historyStack[historyStack.length-1]:null;
  if(!s){init();return}
  hEdges=s.hEdges;vEdges=s.vEdges;boxes=s.boxes;
  current=s.current;scoreA=s.scoreA;scoreB=s.scoreB;lastEdge=s.lastEdge;
  updateUI();draw();
}

/* ======== GAME END ======== */
function endGame(){
  gameOver=true;stopTimer();
  const t=document.getElementById('go-title'),d=document.getElementById('go-detail');
  if(mode==='ttt'){
    if(tttWinner==='X'){t.textContent='🎉 X 方获胜！';d.textContent=`X ${scoreA} : ${scoreB} O`}
    else if(tttWinner==='O'){t.textContent='🎉 O 方获胜！';d.textContent=`X ${scoreA} : ${scoreB} O`}
    else{t.textContent='🤝 平局！';d.textContent=`X ${scoreA} : ${scoreB} O`}
  }else{
    if(scoreA>scoreB)t.textContent='🎉 A 方获胜！';
    else if(scoreB>scoreA)t.textContent='🎉 B 方获胜！';
    else t.textContent='🤝 平局！';
    d.textContent=`绿色 ${scoreA} : ${scoreB} 红色`;
  }
  document.getElementById('game-over-overlay').classList.add('show');
  sndGameOver();celebrate();
}

/* ======== CELEBRATE PARTICLES ======== */
function celebrate(){
  const cc=document.getElementById('celebrate-canvas');
  cc.width=window.innerWidth;cc.height=window.innerHeight;
  const cctx=cc.getContext('2d');
  const colors=['#38bdf8','#fb923c','#facc15','#60a5fa','#c084fc','#fb923c'];
  const particles=[];
  for(let i=0;i<120;i++){
    particles.push({
      x:cc.width/2+(Math.random()-0.5)*200,
      y:cc.height/2,
      vx:(Math.random()-0.5)*8,
      vy:-Math.random()*12-4,
      size:Math.random()*6+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1,decay:0.008+Math.random()*0.01
    });
  }
  function step(){
    cctx.clearRect(0,0,cc.width,cc.height);
    let alive=false;
    for(const p of particles){
      if(p.life<=0)continue;
      alive=true;
      p.x+=p.vx;p.vy+=0.25;p.y+=p.vy;p.life-=p.decay;
      cctx.globalAlpha=Math.max(0,p.life);
      cctx.fillStyle=p.color;
      cctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
    cctx.globalAlpha=1;
    if(alive)requestAnimationFrame(step);
    else cctx.clearRect(0,0,cc.width,cc.height);
  }
  requestAnimationFrame(step);
}

/* ======== UI ======== */
function updateUI(){
  document.getElementById('score-a').textContent=scoreA;
  document.getElementById('score-b').textContent=scoreB;
  const lbl=document.getElementById('turn-label');
  if(mode==='ttt'){
    document.getElementById('label-a').textContent='X：';
    document.getElementById('label-b').textContent='O：';
    lbl.textContent=(tttCurrent==='X'?'X 方':'O 方')+'回合';
    lbl.className='turn-indicator '+(tttCurrent==='X'?'turn-a':'turn-b');
  }else{
    document.getElementById('label-a').textContent='A：';
    document.getElementById('label-b').textContent='B：';
    lbl.textContent=(current==='A'?'A 方':'B 方')+'回合';
    lbl.className='turn-indicator '+(current==='A'?'turn-a':'turn-b');
  }
}

let toastTimeout;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ======== TIMER ======== */
function resetTimer(){
  timerVal=30;document.getElementById('timer').textContent=timerVal;
  if(timerEnabled){clearInterval(timerInterval);timerInterval=setInterval(tickTimer,1000)}
}
function tickTimer(){
  timerVal--;document.getElementById('timer').textContent=timerVal;
  if(timerVal<=0){
    showToast(`⏱ ${current==='A'?'A':'B'} 超时，跳过回合`);
    current=current==='A'?'B':'A';updateUI();resetTimer();draw();
    if(aiMode&&current==='B'&&!gameOver)aiTurn();
  }
}
function toggleTimer(){
  timerEnabled=!timerEnabled;
  document.getElementById('timer-wrap').style.display=timerEnabled?'':'none';
  if(timerEnabled)resetTimer();else clearInterval(timerInterval);
}
function toggleSound(){soundOn=!soundOn;showToast(soundOn?'🔊 音效已开启':'🔇 音效已关闭')}
function stopTimer(){clearInterval(timerInterval)}

/* ======== EVENTS ======== */
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return{
    mx:(touch.clientX-rect.left)*canvas.width/rect.width,
    my:(touch.clientY-rect.top)*canvas.height/rect.height
  };
}
canvas.addEventListener('mousemove',e=>{
  if(gameOver)return;
  const{mx,my}=getPos(e);hoverEdge=hitTest(mx,my);draw();
});
canvas.addEventListener('mouseleave',()=>{hoverEdge=null;draw()});
canvas.addEventListener('click',e=>{
  const{mx,my}=getPos(e);const hit=hitTest(mx,my);
  if(hit)placeEdge(hit.type,hit.r,hit.c);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const{mx,my}=getPos(e);const hit=hitTest(mx,my);
  if(hit)placeEdge(hit.type,hit.r,hit.c);
},{passive:false});

document.querySelectorAll('input[name=mode]').forEach(r=>{
  r.addEventListener('change',()=>{
    mode=r.value==='ttt'?'ttt':'dots';
    aiMode=r.value==='ai';
    document.getElementById('size-select').style.display=mode==='ttt'?'none':'';
    document.getElementById('size-label').style.display=mode==='ttt'?'none':'';
    resetGame();
  });
});

document.getElementById('size-select').addEventListener('change',e=>{
  const n=parseInt(e.target.value);
  if(mode!=='ttt'&&n>=3&&n<=10&&n!==ROWS){
    ROWS=n;COLS=n;updateDims();
    resetGame();
  }
});

/* ======== RESET ======== */
function resetGame(){
  document.getElementById('game-over-overlay').classList.remove('show');
  document.getElementById('celebrate-canvas').getContext('2d').clearRect(0,0,window.innerWidth,window.innerHeight);
  stopTimer();init();localStorage.removeItem('dab-save');
}

/* ======== BOOT ======== */
window.addEventListener('resize',()=>{calcSize();draw()});
calcSize();
if(!loadState())init();
</script>
